<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>功能测试 - 消息编辑 & 重新生成</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1e1e1e; color: #e0e0e0;
            padding: 20px; max-width: 900px; margin: 0 auto;
        }
        h1 { text-align: center; margin-bottom: 24px; color: #fff; }
        .test-section {
            background: #2a2a2a; border-radius: 8px;
            padding: 16px; margin-bottom: 16px;
        }
        .test-section h2 {
            font-size: 18px; margin-bottom: 12px;
            border-bottom: 1px solid #444; padding-bottom: 8px;
        }
        .test-case {
            display: flex; align-items: flex-start;
            padding: 8px 0; border-bottom: 1px solid #333;
        }
        .test-case .status {
            width: 28px; font-size: 18px; flex-shrink: 0;
            text-align: center; margin-right: 10px;
        }
        .test-case .status.pass { color: #4caf50; }
        .test-case .status.fail { color: #f44336; }
        .test-case .status.pending { color: #ff9800; }
        .test-case .info { flex: 1; }
        .test-case .name { font-weight: bold; font-size: 14px; }
        .test-case .detail { font-size: 12px; color: #999; margin-top: 2px; }
        .summary {
            background: #333; border-radius: 8px;
            padding: 16px; margin-top: 16px; text-align: center;
        }
        .summary .big { font-size: 28px; font-weight: bold; }
        .summary.pass-all .big { color: #4caf50; }
        .summary.has-fail .big { color: #f44336; }
        .run-btn {
            display: block; margin: 16px auto; padding: 10px 32px;
            background: #4caf50; color: #fff; border: none;
            border-radius: 6px; font-size: 16px; cursor: pointer;
        }
        .run-btn:hover { background: #43a047; }
        /* 测试用的迷你聊天界面 */
        #testChat {
            border: 1px solid #444; border-radius: 8px;
            padding: 12px; background: #ebebeb; color: #000;
            max-height: 500px; overflow-y: auto; margin-top: 8px;
        }
    </style>
</head>
<body>
    <h1>🧪 功能测试报告</h1>

    <div class="test-section">
        <h2>📝 消息编辑功能</h2>
        <div id="editTests"></div>
    </div>

    <div class="test-section">
        <h2>🔄 重新生成功能</h2>
        <div id="regenTests"></div>
    </div>

    <div class="summary" id="summary">
        <div>等待运行测试...</div>
    </div>

    <button class="run-btn" id="runBtn" onclick="runAllTests()">▶ 运行全部测试</button>

    <!-- 隐藏的测试聊天区域，用于 DOM 操作测试 -->
    <div class="test-section">
        <h2>测试用聊天区（验证 UI 行为）</h2>
        <div id="testChat"></div>
    </div>

    <script>
        // ===== 测试框架 =====
        var testResults = [];

        function assert(condition, name, detail) {
            var status = condition ? 'pass' : 'fail';
            var statusText = condition ? '✓' : '✗';
            testResults.push({ status: status, name: name, detail: detail || '', statusText: statusText });
        }

        function renderResults(containerId) {
            var container = document.getElementById(containerId);
            container.innerHTML = '';
            testResults.forEach(function(r) {
                var div = document.createElement('div');
                div.classList.add('test-case');
                div.innerHTML =
                    '<span class="status ' + r.status + '">' + r.statusText + '</span>' +
                    '<div class="info">' +
                        '<div class="name">' + r.name + '</div>' +
                        (r.detail ? '<div class="detail">' + r.detail + '</div>' : '') +
                    '</div>';
                container.appendChild(div);
            });
        }

        function renderSummary() {
            var summary = document.getElementById('summary');
            var passCount = testResults.filter(function(r) { return r.status === 'pass'; }).length;
            var failCount = testResults.filter(function(r) { return r.status === 'fail'; }).length;
            var allPass = failCount === 0;
            summary.className = 'summary ' + (allPass ? 'pass-all' : 'has-fail');
            summary.innerHTML =
                '<div class="big">' + passCount + ' / ' + testResults.length + ' 通过</div>' +
                (failCount > 0 ? '<div style="color:#f44336;margin-top:4px;">' + failCount + ' 项失败</div>' : '<div style="color:#4caf50;margin-top:4px;">全部通过 ✓</div>');
        }

        // ===== 模拟 conversationHistory 和相关函数 =====
        var conversationHistory = [];
        var lastMessageTimestamp = null;
        var chatMessages;
        var isStreaming = false;
        var abortController = null;
        var currentStreamingBubble = null;
        var currentStreamingText = '';

        function formatTime(ts) { return new Date(ts).toLocaleTimeString('zh-CN'); }

        function appendTimeLabel(timestamp) {
            var show = !lastMessageTimestamp || (timestamp - lastMessageTimestamp >= 5 * 60 * 1000);
            if (show) {
                var timeDiv = document.createElement('div');
                timeDiv.style.cssText = 'text-align:center;font-size:12px;color:#999;margin:8px 0 4px;';
                timeDiv.textContent = formatTime(timestamp);
                chatMessages.appendChild(timeDiv);
            }
            lastMessageTimestamp = timestamp;
        }

        function addUserMessage(text, timestamp) {
            appendTimeLabel(timestamp);
            var div = document.createElement('div');
            div.classList.add('message', 'user');
            div.dataset.msgId = timestamp;
            var bubble = document.createElement('div');
            bubble.classList.add('message-bubble');
            bubble.textContent = text;
            bubble.style.cssText = 'max-width:85%;padding:10px 14px;border-radius:8px;font-size:15px;word-wrap:break-word;background:#95ec69;color:#000;border-top-right-radius:2px;';
            attachEditButton(bubble, timestamp);
            div.appendChild(bubble);
            chatMessages.appendChild(div);
        }

        function attachEditButton(bubble, timestamp) {
            var editBtn = document.createElement('button');
            editBtn.classList.add('user-edit-btn');
            editBtn.textContent = '编辑';
            editBtn.style.cssText = 'position:absolute;top:6px;left:6px;background:transparent;border:1px solid #ddd;border-radius:4px;color:#999;font-size:12px;cursor:pointer;padding:2px 8px;z-index:1;';
            editBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                startEditUserMessage(bubble, timestamp);
            });
            bubble.appendChild(editBtn);
        }

        function attachRegenButton(bubble, timestamp) {
            var regenBtn = document.createElement('button');
            regenBtn.classList.add('ai-regen-btn');
            regenBtn.textContent = '🔄';
            regenBtn.title = '重新生成';
            regenBtn.style.cssText = 'position:absolute;top:6px;right:40px;background:transparent;border:1px solid #ddd;border-radius:4px;color:#999;font-size:12px;cursor:pointer;padding:2px 8px;z-index:1;';
            regenBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                regenerateMessage(timestamp);
            });
            bubble.appendChild(regenBtn);
        }

        function startEditUserMessage(bubble, timestamp) {
            var msgDiv = bubble.closest('.message.user');
            var msg = conversationHistory.find(function(m) { return m.timestamp === timestamp; });
            if (!msg) return;
            var originalText = msg.content;

            bubble.innerHTML = '';
            var textarea = document.createElement('textarea');
            textarea.value = originalText;
            textarea.style.cssText = 'width:100%;min-height:60px;padding:8px;border:1px solid #d9d9d9;border-radius:4px;font-size:15px;font-family:inherit;resize:vertical;outline:none;box-sizing:border-box;';
            textarea.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') cancelEditUserMessage(bubble, timestamp, originalText);
            });

            var btnRow = document.createElement('div');
            btnRow.style.cssText = 'display:flex;justify-content:flex-end;gap:6px;margin-top:6px;';

            var cancelBtn = document.createElement('button');
            cancelBtn.textContent = '取消';
            cancelBtn.style.cssText = 'padding:4px 12px;font-size:13px;border-radius:4px;border:1px solid #d9d9d9;cursor:pointer;background:#fff;';
            cancelBtn.addEventListener('click', function() { cancelEditUserMessage(bubble, timestamp, originalText); });

            var saveBtn = document.createElement('button');
            saveBtn.textContent = '保存';
            saveBtn.style.cssText = 'padding:4px 12px;font-size:13px;border-radius:4px;border:1px solid #2c2c2c;cursor:pointer;background:#2c2c2c;color:#fff;margin-left:0;';
            saveBtn.addEventListener('click', function() {
                var newText = textarea.value.trim();
                if (!newText) return;
                finishEditUserMessage(bubble, msgDiv, timestamp, newText);
            });

            btnRow.appendChild(cancelBtn);
            btnRow.appendChild(saveBtn);
            bubble.appendChild(textarea);
            bubble.appendChild(btnRow);
            textarea.focus();
        }

        function cancelEditUserMessage(bubble, timestamp, originalText) {
            bubble.innerHTML = '';
            bubble.textContent = originalText;
            attachEditButton(bubble, timestamp);
        }

        function finishEditUserMessage(bubble, msgDiv, timestamp, newText) {
            var msgIndex = conversationHistory.findIndex(function(m) { return m.timestamp === timestamp; });
            if (msgIndex === -1) return;

            conversationHistory[msgIndex].content = newText;
            conversationHistory = conversationHistory.slice(0, msgIndex + 1);

            var next = msgDiv.nextElementSibling;
            while (next) {
                var toRemove = next;
                next = next.nextElementSibling;
                toRemove.remove();
            }

            lastMessageTimestamp = timestamp;
            bubble.innerHTML = '';
            bubble.textContent = newText;
            attachEditButton(bubble, timestamp);
        }

        function regenerateMessage(aiTimestamp) {
            if (isStreaming) return;
            var aiIndex = conversationHistory.findIndex(function(m) {
                return m.role === 'assistant' && m.timestamp === aiTimestamp;
            });
            if (aiIndex === -1) return;
            conversationHistory.splice(aiIndex, 1);
            var aiDiv = document.querySelector('.message.ai[data-msg-id="' + aiTimestamp + '"]');
            if (aiDiv) aiDiv.remove();
            // 标志：记录 regenerate 被调用
            window.__regenerateCalled = true;
            window.__regeneratedTimestamp = aiTimestamp;
        }

        // ===== 运行测试 =====
        function runAllTests() {
            testResults = [];
            var chat = document.getElementById('testChat');
            chatMessages = chat;

            // ========== 编辑功能测试 ==========
            var editResults = [];
            function editTest(cond, name, detail) {
                editResults.push({ status: cond ? 'pass' : 'fail', statusText: cond ? '✓' : '✗', name: name, detail: detail || '' });
            }
            function renderEdit() {
                var container = document.getElementById('editTests');
                container.innerHTML = '';
                editResults.forEach(function(r) {
                    var div = document.createElement('div');
                    div.classList.add('test-case');
                    div.innerHTML = '<span class="status ' + r.status + '">' + r.statusText + '</span>' +
                        '<div class="info"><div class="name">' + r.name + '</div>' +
                        (r.detail ? '<div class="detail">' + r.detail + '</div>' : '') + '</div>';
                    container.appendChild(div);
                });
            }

            // 测试 1: 初始化
            chat.innerHTML = '';
            conversationHistory = [];
            lastMessageTimestamp = null;
            var ts1 = Date.now();
            addUserMessage('什么是量子纠缠', ts1);
            conversationHistory.push({ role: 'user', content: '什么是量子纠缠', timestamp: ts1 });

            var userDiv = chat.querySelector('.message.user');
            editTest(userDiv !== null, '1.1 用户消息渲染', 'addUserMessage 创建了 .message.user 元素');
            editTest(userDiv && userDiv.dataset.msgId === String(ts1), '1.2 data-msg-id 属性', '消息 div 携带 data-msg-id=' + ts1);

            var editBtn = userDiv && userDiv.querySelector('.user-edit-btn');
            editTest(editBtn !== null, '1.3 编辑按钮存在', '用户消息气泡包含编辑按钮');
            editTest(editBtn && editBtn.textContent === '编辑', '1.4 编辑按钮文本', '按钮文本为"编辑"');

            // 测试 2: 点击编辑进入编辑模式
            if (editBtn) editBtn.click();
            var textarea = userDiv && userDiv.querySelector('textarea');
            var saveBtn = userDiv && userDiv.querySelector('.save-btn');
            var cancelBtn = userDiv && userDiv.querySelector('button:not(.save-btn)');
            editTest(textarea !== null, '1.5 点击编辑显示文本域', '气泡内出现 textarea');
            editTest(textarea && textarea.value === '什么是量子纠缠', '1.6 文本域包含原始文本', 'textarea.value === 原始消息');
            editTest(saveBtn !== null, '1.7 保存按钮出现', '编辑模式下显示保存按钮');
            editTest(cancelBtn !== null, '1.8 取消按钮出现', '编辑模式下显示取消按钮');

            // 测试 3: 取消编辑
            if (cancelBtn) cancelBtn.click();
            var bubbleAfterCancel = userDiv && userDiv.querySelector('.message-bubble');
            var editBtnAfterCancel = userDiv && userDiv.querySelector('.user-edit-btn');
            editTest(bubbleAfterCancel && bubbleAfterCancel.textContent === '什么是量子纠缠', '1.9 取消编辑恢复原文', '文本恢复为原始内容');
            editTest(editBtnAfterCancel !== null, '1.10 取消后编辑按钮恢复', '编辑按钮重新出现');

            // 测试 4: 保存编辑（修改文本）
            if (editBtnAfterCancel) editBtnAfterCancel.click();
            var textarea2 = userDiv && userDiv.querySelector('textarea');
            if (textarea2) { textarea2.value = '解释一下量子纠缠（编辑后）'; }
            var saveBtn2 = userDiv && userDiv.querySelector('.save-btn');
            if (saveBtn2) saveBtn2.click();
            var bubbleAfterSave = userDiv && userDiv.querySelector('.message-bubble');
            editTest(bubbleAfterSave && bubbleAfterSave.textContent === '解释一下量子纠缠（编辑后）', '1.11 保存编辑更新文本', '气泡显示新文本');
            editTest(conversationHistory[0].content === '解释一下量子纠缠（编辑后）', '1.12 conversationHistory 同步更新', '历史记录中 content 已更新');

            // 测试 5: 编辑后移除后续消息
            var ts2 = Date.now() + 100;
            var aiDiv = document.createElement('div');
            aiDiv.classList.add('message', 'ai');
            aiDiv.dataset.msgId = ts2;
            aiDiv.innerHTML = '<div class="message-bubble" style="max-width:85%;padding:10px 14px;border-radius:8px;background:#fff;position:relative;">AI 回复内容</div>';
            chat.appendChild(aiDiv);
            conversationHistory.push({ role: 'assistant', content: 'AI 回复内容', timestamp: ts2 });

            var aiInDOM = chat.querySelector('.message.ai');
            editTest(aiInDOM !== null, '1.13 添加后续 AI 消息', 'DOM 中存在 AI 消息');

            // 再次编辑用户消息
            var editBtn2 = userDiv.querySelector('.user-edit-btn');
            if (editBtn2) editBtn2.click();
            var textarea3 = userDiv.querySelector('textarea');
            if (textarea3) { textarea3.value = '最终版本的问题'; }
            var saveBtn3 = userDiv.querySelector('.save-btn');
            if (saveBtn3) saveBtn3.click();

            var aiAfterEdit = chat.querySelector('.message.ai');
            editTest(aiAfterEdit === null, '1.14 编辑保存后移除后续消息', '后续 AI 消息从 DOM 中移除');
            editTest(conversationHistory.length === 1, '1.15 编辑后 conversationHistory 长度', '只保留用户消息，长度=' + conversationHistory.length);
            editTest(conversationHistory[0].content === '最终版本的问题', '1.16 最终文本正确', 'conversationHistory 中为编辑后的文本');

            // 测试 6: Escape 键取消
            editBtn2 = userDiv.querySelector('.user-edit-btn');
            if (editBtn2) editBtn2.click();
            var textarea4 = userDiv.querySelector('textarea');
            if (textarea4) {
                textarea4.value = '不应该保存的文本';
                var escEvent = new KeyboardEvent('keydown', { key: 'Escape', keyCode: 27, bubbles: true });
                textarea4.dispatchEvent(escEvent);
            }
            var bubbleAfterEsc = userDiv.querySelector('.message-bubble');
            editTest(bubbleAfterEsc && bubbleAfterEsc.textContent === '最终版本的问题', '1.17 Escape 取消编辑', '按 Escape 后文本恢复');

            // 渲染编辑测试结果
            editResults.forEach(function(r) { testResults.push(r); });
            renderEdit();

            // ========== 重新生成功能测试 ==========
            var regenResults = [];
            function regenTest(cond, name, detail) {
                regenResults.push({ status: cond ? 'pass' : 'fail', statusText: cond ? '✓' : '✗', name: name, detail: detail || '' });
            }
            function renderRegen() {
                var container = document.getElementById('regenTests');
                container.innerHTML = '';
                regenResults.forEach(function(r) {
                    var div = document.createElement('div');
                    div.classList.add('test-case');
                    div.innerHTML = '<span class="status ' + r.status + '">' + r.statusText + '</span>' +
                        '<div class="info"><div class="name">' + r.name + '</div>' +
                        (r.detail ? '<div class="detail">' + r.detail + '</div>' : '') + '</div>';
                    container.appendChild(div);
                });
            }

            // 重置
            chat.innerHTML = '';
            conversationHistory = [];
            lastMessageTimestamp = null;
            window.__regenerateCalled = false;

            var userTs = Date.now();
            addUserMessage('测试问题', userTs);
            conversationHistory.push({ role: 'user', content: '测试问题', timestamp: userTs });

            var aiTs = Date.now() + 100;
            var aiMsgDiv = document.createElement('div');
            aiMsgDiv.classList.add('message', 'ai');
            aiMsgDiv.dataset.msgId = aiTs;
            aiMsgDiv.style.cssText = 'display:flex;flex-direction:column;align-items:flex-start;margin-bottom:16px;';
            var aiBubble = document.createElement('div');
            aiBubble.classList.add('message-bubble');
            aiBubble.style.cssText = 'max-width:85%;padding:10px 14px;border-radius:8px;font-size:15px;word-wrap:break-word;background:#fff;color:#000;border-top-left-radius:2px;position:relative;';
            aiBubble.textContent = '这是 AI 的回复';
            attachRegenButton(aiBubble, aiTs);
            aiMsgDiv.appendChild(aiBubble);
            chat.appendChild(aiMsgDiv);
            conversationHistory.push({ role: 'assistant', content: '这是 AI 的回复', timestamp: aiTs });

            // 测试
            var aiDiv2 = chat.querySelector('.message.ai');
            regenTest(aiDiv2 !== null, '2.1 AI 消息渲染', 'AI 消息存在于 DOM 中');
            regenTest(aiDiv2 && aiDiv2.dataset.msgId === String(aiTs), '2.2 AI 消息 data-msg-id', 'data-msg-id 正确设置');

            var regenBtn = aiBubble.querySelector('.ai-regen-btn');
            regenTest(regenBtn !== null, '2.3 重新生成按钮存在', 'AI 气泡包含重新生成按钮');
            regenTest(regenBtn && regenBtn.textContent === '🔄', '2.4 重新生成按钮图标', '按钮文本为🔄');
            regenTest(regenBtn && regenBtn.title === '重新生成', '2.5 重新生成按钮 title', 'title 属性为"重新生成"');

            // 测试点击重新生成
            var histLenBefore = conversationHistory.length;
            regenTest(histLenBefore === 2, '2.6 重新生成前历史长度', 'conversationHistory 长度=2（1用户+1AI）');

            if (regenBtn) regenBtn.click();
            var aiDivAfter = chat.querySelector('.message.ai');
            regenTest(aiDivAfter === null, '2.7 点击重新生成移除 AI DOM', 'AI 气泡从 DOM 中移除');
            regenTest(conversationHistory.length === 1, '2.8 重新生成后历史长度', 'conversationHistory 长度=1（仅保留用户消息）');
            regenTest(window.__regenerateCalled === true, '2.9 regenerateMessage 被调用', 'regenerateMessage 函数正确执行');

            // 测试重新生成不存在的消息
            window.__regenerateCalled = false;
            regenerateMessage(99999999);
            regenTest(window.__regenerateCalled === false, '2.10 不存在的消息 ID', '传入无效 timestamp 时不做任何操作');

            // 渲染重新生成测试结果
            regenResults.forEach(function(r) { testResults.push(r); });
            renderRegen();

            renderSummary();
        }

        // 页面加载后自动运行
        window.addEventListener('DOMContentLoaded', function() {
            // 延迟运行确保 DOM 就绪
            setTimeout(runAllTests, 100);
        });
    </script>
</body>
</html>
