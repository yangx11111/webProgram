<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>费曼学习助手</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <!-- 聊天容器 -->
    <div class="chat-container">
        <!-- 顶部栏 -->
        <div class="chat-header">
            <div class="header-left">
                <button class="menu-btn" id="menuBtn" title="历史记录">☰</button>
                <span class="app-title">费曼学习助手</span>
            </div>
            <div class="header-right">
                <button class="auth-btn" id="loginBtn">登录</button>
                <button class="new-chat-btn" id="newChatBtn">＋ 新对话</button>
            </div>
        </div>

        <!-- 消息区域（欢迎页 + 聊天内容动态填充） -->
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-logo">🎓</div>
                <div class="welcome-title">费曼学习助手</div>
                <div class="welcome-subtitle">用大白话帮你搞懂任何概念</div>
                <div class="suggestion-cards" id="suggestionCards">
                    <div class="suggestion-card" data-prompt="什么是量子纠缠？用大白话解释一下">什么是量子纠缠？用大白话解释一下</div>
                    <div class="suggestion-card" data-prompt="什么是递归？举一个生活中例子">什么是递归？举一个生活中例子</div>
                    <div class="suggestion-card" data-prompt="给我解释一下牛顿第二定律">给我解释一下牛顿第二定律</div>
                    <div class="suggestion-card" data-prompt="相对论到底在讲什么？">相对论到底在讲什么？</div>
                </div>
            </div>
        </div>

        <!-- 输入区（药丸风格） -->
        <div class="chat-input">
            <div class="input-pill" id="inputPill">
                <input type="file" id="fileInput" style="display:none" accept=".txt,.md,.docx,.pdf,.xlsx" />
                <button class="file-pill-btn" id="filePillBtn" title="上传文件">📎</button>
                <div class="file-chip" id="fileChip" style="display:none">
                    <span id="fileChipName"></span>
                    <button class="file-chip-remove" id="fileChipRemove">✕</button>
                </div>
                <textarea id="userInput" rows="1" placeholder="输入你想了解的概念，或上传文件..."></textarea>
                <button class="send-btn" id="sendBtn" title="发送">➤</button>
            </div>
        </div>
    </div>

    <!-- 遮罩 -->
    <div class="overlay" id="overlay"></div>

    <!-- 历史记录侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>历史记录</span>
            <button class="sidebar-close-btn" id="sidebarCloseBtn">✕</button>
        </div>
        <div class="sidebar-list" id="historyList"></div>
        <div class="sidebar-footer" id="sidebarFooter" style="display:none">
            <div class="user-avatar" id="sidebarAvatar"></div>
            <div class="user-details">
                <div class="user-email" id="sidebarEmail"></div>
            </div>
            <button class="logout-btn" id="sidebarLogoutBtn">退出</button>
        </div>
    </div>

    <!-- 认证弹窗 -->
    <div class="auth-overlay" id="authOverlay"></div>
    <div class="auth-modal" id="authModal">
        <div class="auth-modal-header" id="authModalTitle">登录</div>
        <div class="auth-modal-body">
            <div id="authUsernameGroup">
                <input type="text" id="authUsername" placeholder="用户名" autocomplete="username">
            </div>
            <input type="email" id="authEmail" placeholder="邮箱" autocomplete="email">
            <input type="password" id="authPassword" placeholder="密码（至少6位）" autocomplete="current-password">
            <button id="authSubmitBtn" onclick="handleAuthSubmit()">登录</button>
            <div class="auth-modal-switch" id="authSwitch">
                没有账号？<a href="javascript:void(0)">去注册</a>
            </div>
            <div class="auth-error" id="authError"></div>
        </div>
    </div>

    <!-- JS -->
    <script src="/static/js/api.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/history.js"></script>
    <script src="/static/js/chat.js"></script>

    <script>
        // ===== 初始化：DOM 引用 =====
        const chatMessages   = document.getElementById('chatMessages');
        const userInput      = document.getElementById('userInput');
        const sendBtn        = document.getElementById('sendBtn');
        const sidebar        = document.getElementById('sidebar');
        const overlay        = document.getElementById('overlay');
        const historyList    = document.getElementById('historyList');
        const sidebarCloseBtn = document.getElementById('sidebarCloseBtn');
        const menuBtn        = document.getElementById('menuBtn');
        const newChatBtn     = document.getElementById('newChatBtn');
        const fileInput      = document.getElementById('fileInput');
        const filePillBtn    = document.getElementById('filePillBtn');
        const fileChip       = document.getElementById('fileChip');
        const fileChipName   = document.getElementById('fileChipName');
        const fileChipRemove = document.getElementById('fileChipRemove');
        const loginBtn       = document.getElementById('loginBtn');
        const welcomeScreen  = document.getElementById('welcomeScreen');
        const sidebarFooter  = document.getElementById('sidebarFooter');
        const sidebarAvatar  = document.getElementById('sidebarAvatar');
        const sidebarEmail   = document.getElementById('sidebarEmail');
        const sidebarLogoutBtn = document.getElementById('sidebarLogoutBtn');

        window._lastMessageTimestamp = null;

        // ===== 侧边栏 =====
        function openSidebar() {
            if (isLoggedIn()) { loadConversationsFromServer(); }
            sidebar.classList.add('open');
            overlay.classList.add('show');
        }
        function closeSidebar() {
            sidebar.classList.remove('open');
            overlay.classList.remove('show');
        }
        menuBtn.addEventListener('click', openSidebar);
        sidebarCloseBtn.addEventListener('click', closeSidebar);
        overlay.addEventListener('click', closeSidebar);

        // ===== 发送/停止 =====
        sendBtn.addEventListener('click', function () {
            if (window._isStreaming) { stopGeneration(); }
            else { sendMessage(); }
        });

        // ===== 新对话 =====
        newChatBtn.addEventListener('click', startNewChat);

        // ===== 键盘：Enter 发送，Shift+Enter 换行 =====
        userInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey && !window._isStreaming) {
                e.preventDefault();
                sendMessage();
            }
        });
        // textarea 自动增高
        userInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // ===== 登录按钮 =====
        loginBtn.addEventListener('click', handleAuthBtnClick);
        sidebarLogoutBtn.addEventListener('click', handleAuthBtnClick);

        // ===== 文件上传 =====
        filePillBtn.addEventListener('click', function () {
            fileInput.value = '';
            fileInput.click();
        });
        fileInput.addEventListener('change', function () {
            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                fileChipName.textContent = file.name;
                fileChip.style.display = 'inline-flex';
                const reader = new FileReader();
                reader.onload = function (e) {
                    selectedFile = { name: file.name, type: file.type, dataUrl: e.target.result };
                };
                reader.readAsDataURL(file);
            }
        });
        fileChipRemove.addEventListener('click', function () {
            fileChip.style.display = 'none';
            fileInput.value = '';
            selectedFile = null;
        });

        // ===== 建议卡片点击 =====
        document.getElementById('suggestionCards').addEventListener('click', function (e) {
            const card = e.target.closest('.suggestion-card');
            if (card) {
                userInput.value = card.dataset.prompt;
                userInput.dispatchEvent(new Event('input'));
                userInput.focus();
            }
        });

        // ===== 认证弹窗事件 =====
        document.getElementById('authOverlay').addEventListener('click', hideAuthModal);
        document.getElementById('authSwitch').addEventListener('click', function (e) {
            if (e.target.tagName === 'A') {
                const title = document.getElementById('authModalTitle');
                showAuthModal(title.textContent === '登录' ? 'register' : 'login');
            }
        });
        document.getElementById('authPassword').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') handleAuthSubmit();
        });

        // ===== 刷新时保存草稿 =====
        window.addEventListener('beforeunload', function () {
            if (conversationHistory.length > 0) {
                localStorage.setItem('feynman_current', JSON.stringify(conversationHistory));
            }
        });

        // ===== 隐藏欢迎页（开始聊天后调用） =====
        window._hideWelcome = function () {
            const ws = document.getElementById('welcomeScreen');
            if (ws) ws.style.display = 'none';
        };

        // ===== 页面加载 =====
        function init() {
            updateAuthUI();
            if (!isLoggedIn()) {
                const draft = localStorage.getItem('feynman_current');
                if (draft) {
                    try {
                        const msgs = JSON.parse(draft);
                        chatMessages.innerHTML = '';
                        conversationHistory.length = 0;
                        window._lastMessageTimestamp = null;
                        msgs.forEach(function (msg) {
                            conversationHistory.push(msg);
                            if (msg.role === 'user') {
                                addUserMessage(msg.content, msg.timestamp);
                            } else {
                                renderAIHistoryBubble(msg);
                            }
                        });
                        window._hideWelcome();
                        chatMessages.scrollTop = chatMessages.scrollHeight;
                    } catch (e) {}
                }
            } else {
                loadConversationsFromServer();
            }
        }
        init();
    </script>
</body>
</html>
